<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vibely — Connect & Share</title>
  <link rel="stylesheet" href="css/main.css"/>
  <style>
    body {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      text-align: center; padding: 24px;
      position: relative; overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 20% 80%, rgba(255,107,53,0.2) 0%, transparent 50%),
                  radial-gradient(circle at 80% 20%, rgba(108,99,255,0.2) 0%, transparent 50%);
    }

    .landing-content { position: relative; z-index: 1; max-width: 560px; }

    .landing-logo {
      font-family: 'Syne', sans-serif;
      font-size: clamp(4rem, 12vw, 7rem);
      font-weight: 800;
      color: #FF6B35;
      letter-spacing: -4px;
      line-height: 1;
      margin-bottom: 20px;
      animation: fadeInUp 0.6s ease;
    }
    .landing-tagline {
      color: rgba(255,255,255,0.75);
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      line-height: 1.7;
      margin-bottom: 40px;
      animation: fadeInUp 0.7s ease;
    }
    .landing-btns {
      display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
      animation: fadeInUp 0.8s ease;
    }
    .landing-btns a {
      padding: 14px 32px;
      border-radius: 9999px;
      font-weight: 700; font-size: 1rem;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .btn-get-started {
      background: #FF6B35; color: white;
      border: 2px solid #FF6B35;
    }
    .btn-get-started:hover { background: #e55a26; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,107,53,0.35); }
    .btn-sign-in {
      background: transparent; color: white;
      border: 2px solid rgba(255,255,255,0.3);
    }
    .btn-sign-in:hover { border-color: white; }

    .landing-features {
      display: flex; gap: 32px; justify-content: center;
      margin-top: 56px; flex-wrap: wrap;
      animation: fadeInUp 0.9s ease;
    }
    .feature {
      color: rgba(255,255,255,0.6); font-size: 0.9rem;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .feature .icon { font-size: 1.8rem; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Splash Screen -->
  <div id="splash-screen" style="
    position: fixed; inset: 0; z-index: 9999;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.6s ease;
  ">
    <div style="
      font-family: 'Syne', sans-serif;
      font-size: 5rem; font-weight: 800;
      color: #FF6B35; letter-spacing: -4px;
      animation: splashPop 0.8s cubic-bezier(.175,.885,.32,1.275) forwards;
    ">Vibely</div>
    <div style="
      color: rgba(255,255,255,0.5); font-size: 1rem;
      margin-top: 12px; letter-spacing: 2px;
      animation: splashFade 0.8s 0.3s ease forwards; opacity: 0;
    ">Connect & Share</div>
    <div style="
      width: 40px; height: 4px; background: #FF6B35;
      border-radius: 9999px; margin-top: 32px;
      animation: splashBar 1.5s 0.5s ease forwards; transform: scaleX(0); transform-origin: left;
    "></div>
  </div>

  <style>
    @keyframes splashPop {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes splashFade {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes splashBar {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }
  </style>

<div class="landing-content">
    <div class="landing-logo">Vibely</div>
    <p class="landing-tagline">
      A place to share your world, follow the people you love,<br>
      and discover stories that inspire you every day.
    </p>
    <div class="landing-btns">
      <a href="pages/register.html" class="btn-get-started">Get Started — It's Free</a>
      <a href="pages/login.html"    class="btn-sign-in">Sign In</a>
    </div>
    <div class="landing-features">
      <div class="feature"><span class="icon">📸</span>Share Photos</div>
      <div class="feature"><span class="icon">❤️</span>Like & Comment</div>
      <div class="feature"><span class="icon">🔔</span>Real-time Alerts</div>
      <div class="feature"><span class="icon">🌙</span>Dark Mode</div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Redirect to feed if already logged in
    if (window.Session && Session.isLoggedIn()) {
      window.location.href = 'pages/feed.html';
    }
  </script>

  <script>
    // Hide splash screen after 2 seconds
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(() => splash.remove(), 600);
        }
      }, 2500);
    });
  </script>
</body>
</html>
