<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Vibely</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    body { display: flex; min-height: 100vh; }

    .auth-left {
      width: 45%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
      position: relative;
      overflow: hidden;
    }
    .auth-left::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 70%, rgba(255,107,53,0.18) 0%, transparent 60%),
                  radial-gradient(circle at 80% 20%, rgba(108,99,255,0.18) 0%, transparent 60%);
    }
    .auth-left__content { position: relative; z-index: 1; color: white; text-align: center; }
    .auth-left__logo {
      font-family: var(--font-display);
      font-size: 3.5rem;
      font-weight: 800;
      color: var(--brand);
      letter-spacing: -2px;
      margin-bottom: 16px;
    }
    .auth-left__tagline { font-size: 1.1rem; opacity: 0.7; max-width: 280px; line-height: 1.6; }
    .auth-left__dots {
      display: flex; gap: 24px; margin-top: 48px; justify-content: center;
    }
    .auth-left__dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255,255,255,0.3);
    }
    .auth-left__dot:first-child { background: var(--brand); width: 28px; border-radius: 10px; }

    .auth-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      background: var(--bg);
    }
    .auth-box { width: min(420px, 100%); }
    .auth-box__header { margin-bottom: 32px; }
    .auth-box__title { font-family: var(--font-display); font-size: 2rem; margin-bottom: 6px; }
    .auth-box__sub { color: var(--text-muted); font-size: 0.95rem; }
    .auth-box__sub a { color: var(--brand); font-weight: 600; }

    .auth-divider {
      text-align: center; color: var(--text-muted);
      font-size: 0.82rem; margin: 20px 0; position: relative;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: var(--border);
    }
    .auth-divider::before { left: 0; }
    .auth-divider::after  { right: 0; }

    .error-msg {
      background: #ffeef0; border: 1px solid #f5c6cb;
      color: #c0392b; border-radius: var(--radius-sm);
      padding: 10px 14px; font-size: 0.88rem; margin-bottom: 16px; display: none;
    }
    [data-theme="dark"] .error-msg { background: #2d1215; border-color: #5c2a2a; color: #f87171; }

    @media (max-width: 768px) {
      .auth-left { display: none; }
      .auth-right { padding: 32px 20px; }
    }
  </style>
</head>
<body>
  <div class="auth-left">
    <div class="auth-left__content">
      <div class="auth-left__logo">Vibely</div>
      <p class="auth-left__tagline">Connect, share, and discover stories that matter to you.</p>
      <div class="auth-left__dots">
        <div class="auth-left__dot"></div>
        <div class="auth-left__dot"></div>
        <div class="auth-left__dot"></div>
      </div>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-box">
      <div class="auth-box__header">
        <h1 class="auth-box__title">Welcome back 👋</h1>
        <p class="auth-box__sub">Don't have an account? <a href="register.html">Sign up</a></p>
      </div>

      <div class="error-msg" id="error-msg"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
        </div>
        <button class="btn btn-primary btn-full btn-lg" type="submit" id="login-btn">
          Sign In
        </button>
      </form>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    // Redirect if already logged in
    window.addEventListener('DOMContentLoaded', () => {
      Session.redirectIfAuth('feed.html');

      // Apply saved theme
      if (localStorage.getItem('vb_theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('login-btn');
      const errEl    = document.getElementById('error-msg');

      errEl.style.display = 'none';
      btn.disabled   = true;
      btn.textContent = 'Signing in…';

      try {
        const data = await API.Auth.login({ email, password });
        Session.save(data.token, data.user);
        showToast('Welcome back! 🎉');
        setTimeout(() => window.location.href = 'feed.html', 500);
      } catch (err) {
        errEl.textContent   = err.message;
        errEl.style.display = 'block';
        btn.disabled        = false;
        btn.textContent     = 'Sign In';
      }
    });

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'vb-toast';
      t.innerHTML = `<span>${msg}</span>`;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }
  </script>
</body>
</html>
